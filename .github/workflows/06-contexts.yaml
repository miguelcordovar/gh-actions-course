name: 06 - Contexts

run-name: My custom workflow run name | DEBUG - ${{ inputs.debug }} 
on:
    workflow_dispatch:
        inputs:
            debug:
                type: boolean
                default: false

env:
    MY_WORKFLOW_VAR: "workflow"
    MY_OVERWRITTEN_VAR: "workflow"

jobs:
    echo-data:
        env:
            MY_JOB_VAR: "job"
            MY_OVERWRITTEN_VAR: "job"
        runs-on: ubuntu-latest
        steps:
            - name: Show some context data
              run: |
                echo "Repository: ${{ github.repository }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Event Name: ${{ github.event_name }}"
                echo "Actor: ${{ github.actor }}"
                echo "Workflow Run ID: ${{ github.run_id }}"
                echo "Workflow Run Number: ${{ github.run_number }}"
                echo "Job ID: ${{ github.job }}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha }}"
            - name: Retrieve Variable
              run: |
                echo "The value of MY_VAR is: ${{ vars.MY_VAR || 'Not set' }}"
            - name: Print Env Variables - without overrides
              run: |
                    echo "MY_WORKFLOW_VAR: $MY_WORKFLOW_VAR"
                    echo "MY_JOB_VAR: $MY_JOB_VAR"
                    echo "MY_STEP_VAR: $MY_STEP_VAR"
                    echo "MY_OVERWRITTEN_VAR: $MY_OVERWRITTEN_VAR"
            - name: Print Env Variables
              env:
                MY_STEP_VAR: "step"
                MY_OVERWRITTEN_VAR: "step"
              run: |
                    echo "MY_WORKFLOW_VAR: $MY_WORKFLOW_VAR"
                    echo "MY_JOB_VAR: $MY_JOB_VAR"
                    echo "MY_STEP_VAR: $MY_STEP_VAR"
                    echo "MY_OVERWRITTEN_VAR: $MY_OVERWRITTEN_VAR"
